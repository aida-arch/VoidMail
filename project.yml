name: VoidMail
options:
  bundleIdPrefix: com.voidmail
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  VoidMail:
    type: application
    platform: iOS
    sources:
      - path: VoidMail
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voidmail.app
        INFOPLIST_FILE: VoidMail/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
